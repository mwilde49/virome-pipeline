# ============================================================
# Virome Pipeline Configuration
# ============================================================
# Fill in all required fields before running.
# Paths must be absolute (no symlinks — Apptainer bind requirement).

# --- Project ---
project_name: my_project        # used for output directory naming
user: __USER__                  # your Juno username

# --- Input ---
samplesheet: /work/__USER__/pipelines/virome/samplesheet.csv

# --- Output ---
outdir: /scratch/juno/__USER__/pipelines/virome/__PROJECT__

# --- References ---
star_index:    /groups/tprice/pipelines/references/star_index
kraken2_db:    /groups/tprice/pipelines/references/kraken2_viral_db

# --- Containers ---
container_dir: /groups/tprice/pipelines/containers/virome

# --- Trimmomatic ---
trim_headcrop:       0
trim_leading:        3
trim_trailing:       3
trim_slidingwindow:  "4:15"
trim_minlen:         36

# --- Host Removal (STAR) ---
star_extra_args: ""

# --- Kraken2 Classification ---
kraken2_confidence:  0.1     # 0.0–1.0; higher = more specific, lower = more sensitive
kraken2_extra_args:  ""

# --- Bracken ---
bracken_read_length: 150    # match your sequencing read length (50/75/100/150/200/250/300)
bracken_level:       "S"    # S=species, G=genus
bracken_threshold:   10     # min reads to re-estimate

# --- Filtering ---
min_reads_per_taxon: 5       # discard taxa with fewer than this many reads per sample
artifact_list: null          # set to path of artifact_taxa.tsv to enable exclusion, or leave null

# --- Reporting ---
multiqc_title: "Virome QC Report"
