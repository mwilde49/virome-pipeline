# virome-pipeline run config — Iadorola et al. human trigeminal ganglia cohort
# Source: BioProject SRP113004 (PMID 28264986); NIMH Human Brain Collection Core
# 16 samples: TG1–TG22 (not contiguous); all female except TG3, TG11; ages 18–64
# Platform: Illumina HiSeq 2500, 125 bp paired-end, ~33M spots/sample

samplesheet: "/groups/tprice/pipelines/containers/virome/assets/samplesheets/samplesheet_iadorola_tg_juno.csv"
outdir:      "/scratch/juno/maw210003/virome_iadorola_tg"

# References (pre-built on Juno)
star_index:    "/groups/tprice/pipelines/references/star_index"
kraken2_db:    "/groups/tprice/pipelines/references/kraken2_viral_db"
kraken2_db2:   "/groups/tprice/pipelines/references/kraken2_pluspf_db"

# Containers
container_dir: "/groups/tprice/pipelines/containers/virome"

# Filtering
min_reads:     5
artifact_list: "/groups/tprice/pipelines/containers/virome/assets/artifact_taxa.tsv"
taxon_remap:   "/groups/tprice/pipelines/containers/virome/assets/taxon_remap.tsv"

# Trimmomatic
trim_adapters: "TruSeq3-PE"
trim_leading:  3
trim_trailing: 3
trim_minlen:   36

# Kraken2
kraken2_confidence: 0.1
bracken_read_len:   125
bracken_level:      "S"
