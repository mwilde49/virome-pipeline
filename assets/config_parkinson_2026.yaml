# virome-pipeline run config — 2026 Parkinson's DRG cohort
# Sequenced by Psomagen (order AN00028264)
# 20 samples: 14 PD patients (PD2-PD20, non-contiguous) + 6 controls (023-028)
# NOTE: clarify whether 023-028 are healthy controls or a separate disease group
# NOTE: PD1, PD7, PD8, PD11, PD12, PD13 absent from this delivery — confirm with provider

samplesheet: "/groups/tprice/pipelines/containers/virome/assets/samplesheets/samplesheet_parkinson_2026_juno.csv"
outdir:      "/scratch/juno/maw210003/virome_parkinson_2026"

# References (pre-built on Juno)
star_index:    "/groups/tprice/pipelines/references/star_index"
kraken2_db:    "/groups/tprice/pipelines/references/kraken2_viral_db"
kraken2_db2:   "/groups/tprice/pipelines/references/kraken2_pluspf_db"

# Containers
container_dir: "/groups/tprice/pipelines/containers/virome"

# Filtering
min_reads:     5
artifact_list: "/groups/tprice/pipelines/containers/virome/assets/artifact_taxa.tsv"
taxon_remap:   "/groups/tprice/pipelines/containers/virome/assets/taxon_remap.tsv"

# Trimmomatic
trim_adapters: "TruSeq3-PE"
trim_leading:  3
trim_trailing: 3
trim_minlen:   36

# Kraken2
kraken2_confidence: 0.1
bracken_read_len:   150
bracken_level:      "S"
