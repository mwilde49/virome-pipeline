# config_fullcohort_pluspf.yaml — Full cohort dual-DB run (paper 1)
#
# 20 samples: 5 skeletal muscle (Sample_19–23), 6 donor1 DRG (L1–L5, T12),
# 5 AIG1390 DRG (L1–L4, T12), 4 Saad DRG (1, 3, 4, 5 — Saad_2 excluded: library failure)
#
# Saad_1 flagged as QC outlier (10x depth, elevated contamination) — included for
# now; run sensitivity analyses with and without Saad_1 before manuscript submission.
#
# Run from the virome pipeline root on Juno:
#   srun --account=tprice --partition=normal --cpus-per-task=2 --mem=4G --time=4:00:00 --pty bash
#   export NXF_JVM_ARGS="-Xms512m -Xmx2g"
#   cd /groups/tprice/pipelines/containers/virome
#   bash scripts/preflight_check.sh --dual-db --params-file assets/config_fullcohort_pluspf.yaml
#   /groups/tprice/pipelines/bin/nextflow run main.nf -profile slurm \
#       -params-file assets/config_fullcohort_pluspf.yaml

samplesheet:   "/groups/tprice/pipelines/containers/virome/samplesheets/all_cohort_pluspf.csv"
outdir:        "/work/maw210003/pipelines/virome/fullcohort_pluspf"

star_index:    "/groups/tprice/pipelines/references/star_index"
kraken2_db:    "/groups/tprice/pipelines/references/kraken2_viral_db"
kraken2_db2:   "/groups/tprice/pipelines/references/kraken2_pluspf_db"

container_dir: "/groups/tprice/pipelines/containers/virome"

# Bracken read length — 150 bp across all cohorts
bracken_read_length: 150

# Filtering — same thresholds as pluspf_v3 for comparability
min_reads_per_taxon: 5
artifact_list:  "/groups/tprice/pipelines/containers/virome/assets/artifact_taxa.tsv"
taxon_remap:    "/groups/tprice/pipelines/containers/virome/assets/taxon_remap.tsv"
